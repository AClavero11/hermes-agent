# ILS Auto-Quote Pipeline
#
# End-to-end RFQ processing: intake → V11 inventory → customer intelligence →
# pricing calculation → draft SO creation → approval routing.
#
# Enables rapid turnaround on repeat customers with exact stock matches.
# Auto-sends quotes for qualified customers; routes others to human approval.
#
# Usage:
#   hermes pipeline run ils-auto-quote.yaml \
#     --rfq_id "RFQ-2026-0347" \
#     --customer_email "ops@example.com" \
#     --customer_name "Example Aviation Inc" \
#     --parts '[{"part_number":"1709121","quantity":1,"condition":"serviceable"}]'
#
# Or with defaults:
#   hermes pipeline run ils-auto-quote.yaml --rfq_id "RFQ-2026-0347"

metadata:
  name: "ils-auto-quote"
  version: "1.0.0"
  description: "End-to-end ILS RFQ processing with auto-send eligibility evaluation"
  author: "hermes-agent"
  tags: ["ils", "auto-quote", "revenue", "pipeline"]

# ============================================================================
# INPUTS: RFQ intake data
# ============================================================================

inputs:
  rfq_id:
    type: string
    description: "RFQ identifier (e.g., RFQ-2026-0347)"
    required: true

  customer_email:
    type: string
    description: "Customer email address"
    required: true

  customer_name:
    type: string
    description: "Customer or company name"
    required: true

  parts:
    type: string
    description: "JSON array of part requests: [{part_number, quantity, condition}]"
    required: true

  auto_send_threshold_score:
    type: integer
    description: "Minimum quality score for auto-send eligibility (0-100)"
    default: 85

  auto_send_max_value:
    type: float
    description: "Maximum order value ($) for auto-send without approval"
    default: 5000.0

# ============================================================================
# STEPS: Multi-step RFQ processing pipeline
# ============================================================================

steps:
  # Step 1: Parse and validate parts JSON
  - name: "parse_parts"
    tool: "format_response"
    args:
      data: "{{parts}}"
      template: "{{parts}}"
    on_error: "abort"
    description: "Parse JSON parts array"

  # Step 2: Lookup each part in V11 inventory
  - name: "inventory_lookup"
    tool: "v11_search"
    args:
      query: "{{parts}}"
      limit: 10
    on_error: "continue"
    description: "Search V11 inventory for requested parts"

  # Step 3: Pull customer history from V11 partners
  - name: "customer_intelligence"
    tool: "v11_search"
    args:
      query: "{{customer_email}}"
      limit: 5
    on_error: "continue"
    description: "Retrieve customer order history and profile"

  # Step 4: Get live stock levels and lot details
  - name: "stock_enrichment"
    tool: "v11_search"
    args:
      query: "{{inventory_lookup.result}}"
      limit: 20
    on_error: "continue"
    description: "Get current qty_available and lot conditions from V11"

  # Step 5: Claude pricing analysis
  # Calculates optimal price using sales history + customer tier logic
  - name: "pricing_calculation"
    tool: "claude_reason"
    args:
      task: |
        Calculate optimal quote pricing for this RFQ.

        For each part, determine:
        1. Base price (from V11 last_sale_price or list_price)
        2. Customer tier discount (new: 0%, repeat: 5-15%, VIP: 15-25%)
        3. Quantity discount (if applicable)
        4. Final unit price and total line value

        Return JSON format (no markdown):
        {
          "lines": [
            {
              "part_number": "...",
              "quantity": X,
              "condition": "...",
              "unit_price": X.XX,
              "line_total": X.XX,
              "pricing_basis": "last_sale|list_price|market"
            }
          ],
          "subtotal": X.XX,
          "note": "pricing rationale"
        }

      context: |
        RFQ ID: {{rfq_id}}
        Customer: {{customer_name}} ({{customer_email}})

        INVENTORY DATA:
        {{inventory_lookup.result}}

        CUSTOMER HISTORY:
        {{customer_intelligence.result}}

        STOCK LEVELS:
        {{stock_enrichment.result}}

        REQUESTED PARTS:
        {{parts}}

      model: "sonnet"
      max_tokens: 2000
      temperature: 0.2

    on_error: "abort"
    description: "Claude calculates optimal pricing"

  # Step 6: Evaluate auto-send eligibility
  # 5-point rubric: repeat customer, score threshold, exact stock, value threshold, not new
  - name: "auto_send_evaluation"
    tool: "claude_reason"
    args:
      task: |
        Evaluate auto-send eligibility for this quote. Return JSON only (no markdown):

        {
          "eligible": true|false,
          "score": 0-100,
          "passed_checks": {
            "repeat_customer": true|false,
            "score_threshold": true|false,
            "exact_stock_match": true|false,
            "value_threshold": true|false,
            "not_new_customer": true|false
          },
          "reason": "brief explanation"
        }

      context: |
        Auto-Send Criteria:
        1. REPEAT CUSTOMER: 3+ prior orders
        2. QUALITY SCORE: >= {{auto_send_threshold_score}} (100 = perfect match)
        3. EXACT STOCK MATCH: All qty in single lot, no partial fulfillment
        4. ORDER VALUE: Total < ${{auto_send_max_value}}
        5. NOT NEW: Customer has >= 1 prior order

        Customer History: {{customer_intelligence.result}}
        Pricing Result: {{pricing_calculation.result}}
        Stock Status: {{stock_enrichment.result}}

      model: "haiku"
      max_tokens: 500
      temperature: 0.0

    on_error: "continue"
    description: "Evaluate auto-send eligibility (5-point rubric)"

  # Step 7: Create draft sale order in V11
  - name: "create_draft_so"
    tool: "v11_create_order"
    args:
      customer_email: "{{customer_email}}"
      customer_name: "{{customer_name}}"
      lines: "{{pricing_calculation.result.lines}}"
      reference: "{{rfq_id}}"
      notes: "Auto-generated from RFQ {{rfq_id}}"
    on_error: "abort"
    description: "Create draft sale order in V11"

  # Step 8: Route to auto-send or approval
  # Decision logic: if eligible AND passed checks, auto-send; else route for approval
  - name: "routing_decision"
    tool: "claude_reason"
    args:
      task: |
        Determine routing for this quote. Return JSON only:

        {
          "action": "auto_send" | "requires_approval",
          "draft_so_id": "{{create_draft_so.result.id}}",
          "draft_so_name": "{{create_draft_so.result.name}}",
          "eligible": {{auto_send_evaluation.result.eligible}},
          "score": {{auto_send_evaluation.result.score}},
          "reason": "brief explanation",
          "next_step": "send draft via email" | "route to sales manager"
        }

      context: |
        RFQ: {{rfq_id}}
        Customer: {{customer_name}}

        Auto-Send Evaluation:
        {{auto_send_evaluation.result}}

        Draft SO Created:
        ID: {{create_draft_so.result.id}}
        Name: {{create_draft_so.result.name}}

      model: "haiku"
      max_tokens: 300
      temperature: 0.0

    on_error: "continue"
    description: "Determine approval routing (auto-send vs manual)"

# ============================================================================
# OUTPUTS: Pipeline result summary
# ============================================================================

outputs:
  # Draft order details
  draft_order_id:
    description: "V11 draft sale order ID"
    value: "{{create_draft_so.result.id}}"

  draft_order_name:
    description: "V11 draft sale order document name"
    value: "{{create_draft_so.result.name}}"

  # Routing decision
  routing_action:
    description: "Routing decision: auto_send or requires_approval"
    value: "{{routing_decision.result.action}}"

  routing_reason:
    description: "Explanation for routing decision"
    value: "{{routing_decision.result.reason}}"

  auto_send_eligible:
    description: "Whether quote qualifies for auto-send"
    value: "{{auto_send_evaluation.result.eligible}}"

  auto_send_score:
    description: "Auto-send quality score (0-100)"
    value: "{{auto_send_evaluation.result.score}}"

  # Pricing summary
  pricing_subtotal:
    description: "Total pricing before taxes/shipping"
    value: "{{pricing_calculation.result.subtotal}}"

  pricing_note:
    description: "Pricing strategy note"
    value: "{{pricing_calculation.result.note}}"

  # Customer profile
  customer_email:
    description: "Customer email"
    value: "{{customer_email}}"

  customer_name:
    description: "Customer company name"
    value: "{{customer_name}}"

  customer_history:
    description: "Customer order history and profile data"
    value: "{{customer_intelligence.result}}"

  # Stock status
  stock_status:
    description: "Current inventory status for requested parts"
    value: "{{stock_enrichment.result}}"

  # Full results for audit trail
  full_pricing_analysis:
    description: "Complete pricing calculation details"
    value: "{{pricing_calculation.result}}"

  full_auto_send_evaluation:
    description: "Complete auto-send eligibility evaluation"
    value: "{{auto_send_evaluation.result}}"

# ============================================================================
# PERFORMANCE: Budget constraints for production use
# ============================================================================

performance:
  max_duration_seconds: 120
  max_api_cost_usd: 1.50

# ============================================================================
# RETRY: Resilience strategy for key steps
# ============================================================================

retry:
  max_attempts: 2
  on_failure:
    - step: "inventory_lookup"
      strategy: "backoff_exponential"

    - step: "customer_intelligence"
      strategy: "backoff_exponential"

    - step: "stock_enrichment"
      strategy: "backoff_exponential"

    - step: "pricing_calculation"
      strategy: "use_cheaper_model"

    - step: "create_draft_so"
      strategy: "backoff_exponential"
